<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src https://api.gumroad.com https://api.anthropic.com https://gumroad.com; img-src 'self' data: https: blob:;"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Publish</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="shared.js"></script>
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;--accent:#51cf66;--text:#f0f0f5;--muted:#6b6b8a;--success:#51cf66;--danger:#ff6b6b;--yellow:#ffe66d;--purple:#667eea;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
  header{border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}.logo span{color:var(--accent);}
  .container{max-width:1000px;margin:0 auto;padding:28px 20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px;}
  .card h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px;}
  .card p{color:var(--muted);font-size:12px;margin-bottom:24px;line-height:1.6;}
  .form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .form-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s;width:100%;max-width:400px;}
  .form-input:focus{border-color:var(--accent);}
  .btn{background:var(--accent);color:#0a0a0f;border:none;border-radius:10px;padding:12px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
  .btn:hover{opacity:0.85;transform:translateY(-1px);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);background:transparent;}
  .btn-danger{background:var(--danger);color:white;}
  .btn-danger:hover{opacity:0.85;}
  .btn-sm{padding:7px 14px;font-size:11px;border-radius:7px;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
  .search-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;width:220px;}
  .search-bar:focus{border-color:var(--accent);}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;}
  .stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .stat-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .table-header{padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .table-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:10px 16px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);}
  td{padding:11px 16px;font-size:12px;border-bottom:1px solid rgba(42,42,58,0.4);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(28,28,39,0.6);}
  .check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
  .toggle-switch{position:relative;width:40px;height:22px;}
  .toggle-switch input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:22px;transition:0.3s;}
  .toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;}
  input:checked + .toggle-slider{background:var(--success);}
  input:checked + .toggle-slider:before{transform:translateX(18px);}
  .status-bar{font-size:12px;color:var(--muted);padding:12px 0;text-align:center;}
</style>
</head>
<body>
<header><div class="logo">Bulk <span>Publish</span></div><div style="font-size:11px;color:var(--muted)" id="hStatus">Not connected</div></header>
<div class="container">
  <div id="setup">
    <div class="card">
      <h2>⚡ Bulk Publish / Unpublish</h2>
      <p>Select multiple products and toggle them published or unpublished at once. Filter by status to quickly manage your store visibility.</p>
      <div class="form-group"><label class="form-label">Gumroad API Token</label><input class="form-input" id="gumroadToken" type="password" /></div>
      <button class="btn" onclick="loadProducts()">⚡ Load Products</button>
    </div>
  </div>
  <div id="results" style="display:none">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:var(--purple)" id="sTotal">0</div></div>
      <div class="stat-card"><div class="stat-label">Published</div><div class="stat-value" style="color:var(--success)" id="sPublished">0</div></div>
      <div class="stat-card"><div class="stat-label">Unpublished</div><div class="stat-value" style="color:var(--muted)" id="sUnpublished">0</div></div>
    </div>
    <div class="toolbar">
      <input class="search-bar" placeholder="🔍 Search..." oninput="filterRows(this.value)" />
      <select class="search-bar" style="width:160px" onchange="filterStatus(this.value)">
        <option value="all">All products</option>
        <option value="published">Published only</option>
        <option value="unpublished">Unpublished only</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="selectAll()">Select All</button>
      <button class="btn btn-outline btn-sm" onclick="deselectAll()">Deselect</button>
      <button class="btn btn-sm" onclick="bulkAction('publish')">✅ Publish Selected</button>
      <button class="btn btn-danger btn-sm" onclick="bulkAction('unpublish')">⬇️ Unpublish Selected</button>
    </div>
    <div class="table-wrap">
      <div class="table-header"><div class="table-title">Products</div><div id="prodCount" style="font-size:11px;color:var(--muted)"></div></div>
      <table>
        <thead><tr><th><input type="checkbox" class="check" onchange="toggleAll(this)" /></th><th>Product</th><th>Price</th><th>Sales</th><th>Published</th></tr></thead>
        <tbody id="prodTable"></tbody>
      </table>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>
</div>
<script>
let products = [];

async function loadProducts() {
  const token = document.getElementById('gumroadToken').value.trim();
  if (!token) return showSharedToast('Enter your token', 'error');
  GR.setGumroad(token);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('prodTable').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--muted)">Loading...</td></tr>';
  try {
  const res = await gumroadAPI('/v2/products');
  if (!res.success) return showSharedToast('Failed to load', 'error');
  products = res.products;
  document.getElementById('hStatus').textContent = `${products.length} products`;
  updateStats(); renderTable(products);
  } catch(e) { showSharedToast('Error: ' + e.message, 'error'); document.getElementById('setup').style.display='block'; document.getElementById('results').style.display='none'; }
}

function updateStats() {
  const pub = products.filter(p => p.published).length;
  document.getElementById('sTotal').textContent = products.length;
  document.getElementById('sPublished').textContent = pub;
  document.getElementById('sUnpublished').textContent = products.length - pub;
}

function renderTable(prods) {
  document.getElementById('prodCount').textContent = prods.length + ' products';
  document.getElementById('prodTable').innerHTML = prods.map((p,i) => {
    const price = p.price ? '$' + (p.price/100).toFixed(2) : 'Free';
    const realIdx = products.indexOf(p);
    const thumb = p.thumbnail_url ? `<img src="${p.thumbnail_url}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;margin-right:10px;vertical-align:middle;" />` : '<span style="display:inline-block;width:36px;height:36px;background:var(--surface2);border-radius:6px;margin-right:10px;vertical-align:middle;text-align:center;line-height:36px;font-size:16px;">🛍️</span>';
    return `<tr>
      <td><input type="checkbox" class="check prod-check" data-idx="${realIdx}" /></td>
      <td style="max-width:320px"><div style="display:flex;align-items:center">${thumb}<div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div></div></td>
      <td style="color:var(--yellow)">${price}</td>
      <td style="color:var(--muted)">${p.sales_count||0}</td>
      <td>
        <label class="toggle-switch">
          <input type="checkbox" ${p.published?'checked':''} onchange="toggleOne('${p.id}', this, ${realIdx})" />
          <span class="toggle-slider"></span>
        </label>
      </td>
    </tr>`;
  }).join('');
}

async function toggleOne(id, cb, idx) {
  const action = cb.checked ? 'enable' : 'disable';
  const res = await gumroadAPI(`/v2/products/${id}/${action}`, 'PUT');
  if (res.success) { products[idx].published = cb.checked; updateStats(); showSharedToast(cb.checked ? '✅ Published' : '⬇️ Unpublished', 'success'); }
  else { cb.checked = !cb.checked; showSharedToast('Failed to update', 'error'); }
}

async function bulkAction(action) {
  const checked = [...document.querySelectorAll('.prod-check:checked')].map(c => parseInt(c.dataset.idx));
  if (!checked.length) return showSharedToast('Select products first', 'error');
  const label = action === 'publish' ? 'Publish' : 'Unpublish';
  confirmAction(`${label} ${checked.length} product${checked.length>1?'s':''}?`, () => _doBulkAction(action, checked));
}
async function _doBulkAction(action, checked) {
  document.getElementById('statusBar').textContent = `Processing ${checked.length} products...`;
  let done = 0;
  for (const idx of checked) {
    const p = products[idx];
    const endpoint = action === 'publish' ? 'enable' : 'disable';
    const res = await gumroadAPI(`/v2/products/${p.id}/${endpoint}`, 'PUT');
    if (res.success) { products[idx].published = action === 'publish'; done++; }
    await new Promise(r => setTimeout(r, 300));
  }
  updateStats(); renderTable(products);
  document.getElementById('statusBar').textContent = `✅ ${action === 'publish' ? 'Published' : 'Unpublished'} ${done} products`;
  showSharedToast(`Done! ${done} products updated`, 'success');
  const reverseAction = action === 'publish' ? 'unpublish' : 'publish';
  UndoManager.push(`${action === 'publish' ? 'Published' : 'Unpublished'} ${done} products`, () => _doBulkAction(reverseAction, checked));
}

function filterRows(q) { renderTable(products.filter(p => p.name.toLowerCase().includes(q.toLowerCase()))); }
function filterStatus(s) {
  if (s === 'published') renderTable(products.filter(p => p.published));
  else if (s === 'unpublished') renderTable(products.filter(p => !p.published));
  else renderTable(products);
}
function selectAll() { document.querySelectorAll('.prod-check').forEach(c => c.checked = true); }
function deselectAll() { document.querySelectorAll('.prod-check').forEach(c => c.checked = false); }
function toggleAll(cb) { document.querySelectorAll('.prod-check').forEach(c => c.checked = cb.checked); }
injectThemeToggle();
checkTokenOrWarn(false);
injectNav('bulk-publish'); injectMobileStyles(); prefillTokens();
</script>
</body>
</html>
